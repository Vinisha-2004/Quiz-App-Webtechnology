<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMARTSPARK | Signup</title>
  <meta name="description" content="Create your SMARTSPARK account and start your quiz journey.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./auth.css">
</head>
<body data-page="signup">
  <canvas id="auth-canvas" aria-hidden="true"></canvas>

  <main class="auth-page">
    <section class="auth-shell">
      <header class="auth-copy reveal">
        <h1>Welcome To <span>SMARTSPARK</span></h1>
        <p class="auth-subtitle">Create an account to unlock the platform, track your progress, and join the quiz flow.</p>
      </header>

      <div class="auth-card-wrap reveal">
        <div class="auth-card" id="authCard">
          <h2 class="auth-title">SIGNUP PAGE</h2>
          <div class="title-spark" aria-hidden="true"></div>

          <form class="auth-form" id="authForm" novalidate data-auth-form>
            <div class="field">
              <label for="name">Name</label>
              <div class="input-shell">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M12 3a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Zm0 11c4.4 0 8 2.7 8 6v1H4v-1c0-3.3 3.6-6 8-6Z"></path>
                  </svg>
                </span>
                <input id="name" type="text" name="name" placeholder="Enter the Name" autocomplete="name" required>
              </div>
            </div>

            <div class="field">
              <label for="email">Email</label>
              <div class="input-shell">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M4 6h16v12H4V6Zm2 2v.5l6 4 6-4V8H6Zm12 8V10l-6 4-6-4v6h12Z"></path>
                  </svg>
                </span>
                <input id="email" type="email" name="email" placeholder="Enter the Email" autocomplete="email" required>
              </div>
            </div>

            <div class="field">
              <label for="pass">Password</label>
              <div class="input-shell">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M7 10V8a5 5 0 0 1 10 0v2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1Zm2 0h6V8a3 3 0 0 0-6 0v2Zm3 4a1.75 1.75 0 0 0-.75 3.33V19h1.5v-1.67A1.75 1.75 0 0 0 12 14Z"></path>
                  </svg>
                </span>
                <input id="pass" type="password" name="password" placeholder="Enter the Password" autocomplete="new-password" required minlength="8">
                <button class="toggle-password" type="button" data-toggle-password aria-label="Show password" aria-pressed="false">
                  <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5c5.5 0 9.7 4 11 7-1.3 3-5.5 7-11 7S2.3 15 1 12c1.3-3 5.5-7 11-7Zm0 2C7.7 7 4.1 9.8 2.6 12 4.1 14.2 7.7 17 12 17s7.9-2.8 9.4-5C19.9 9.8 16.3 7 12 7Zm0 2.25A2.75 2.75 0 1 1 12 14.5a2.75 2.75 0 0 1 0-5.25Z"></path>
                  </svg>
                </button>
              </div>
            </div>

            <button class="primary-btn" type="submit">
              <span>Signup</span>
            </button>

            <p class="auth-switch">Already have an account? <a href="./login.html">Login</a></p>
            <p class="auth-status" id="authStatus" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="./auth.js"></script>
</body>
</html>
